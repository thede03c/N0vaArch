#!/usr/bin/env bash
#
# mkinitcpio config used by mkarchiso when building the live ISO initramfs.
# This MUST include the archiso hooks, otherwise the kernel/initramfs can’t find
# and mount the ISO medium reliably.
#
# This follows the upstream archiso "releng" style (hook order matters).
#

MODULES=()
BINARIES=()
FILES=()

HOOKS=(
  base
  udev
  microcode
  modconf
  kms
  keyboard
  keymap
  block
  filesystems
  fsck

  # ArchISO live boot
  archiso
  archiso_loop_mnt
  archiso_pxe_common
  archiso_pxe_nbd
  archiso_pxe_http
  archiso_pxe_nfs
)

COMPRESSION="xz"
