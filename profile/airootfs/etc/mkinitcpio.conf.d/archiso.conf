# memdisk is only for Syslinux memdisk setups; hook calls memdiskfind which is NOT
# included in archiso live initramfs → breaks live boot ("mount '' on real root").
HOOKS=(base udev microcode modconf kms archiso archiso_loop_mnt archiso_pxe_common archiso_pxe_nbd archiso_pxe_http archiso_pxe_nfs block filesystems keyboard)
COMPRESSION="xz"
COMPRESSION_OPTIONS=(-9e)
