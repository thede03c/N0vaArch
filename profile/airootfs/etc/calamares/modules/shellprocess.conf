---
dontChroot: true
timeout: 120
script:
  - command: "mkdir -p @ROOT@/etc/novaarch"
  - command: "if [ -f /tmp/novaarch-installer/choices.env ]; then cp /tmp/novaarch-installer/choices.env @ROOT@/etc/novaarch/installer-choices.env; fi"
  - command: "chroot @ROOT@ /usr/local/bin/novaarch-apply-installer-choices"
  - command: "rm -f @ROOT@/etc/sudoers.d/05-novaarch-live-calamares"
  - command: "chroot @ROOT@ userdel -rf live 2>/dev/null || true"
