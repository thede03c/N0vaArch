<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaArch Velvet Pulse</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0d12; }
    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      background:
        radial-gradient(circle at 20% 20%, rgba(214,63,63,0.35), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(120,140,255,0.20), transparent 46%),
        radial-gradient(circle at 50% 80%, rgba(255,80,110,0.22), transparent 48%);
      animation: drift 16s ease-in-out infinite alternate;
      filter: blur(14px);
    }
    @keyframes drift {
      from { transform: translate(-2%, -1%) scale(1); }
      to { transform: translate(2%, 1%) scale(1.08); }
    }
  </style>
</head>
<body></body>
</html>
