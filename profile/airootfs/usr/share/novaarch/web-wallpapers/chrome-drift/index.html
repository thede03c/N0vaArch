<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaArch Chrome Drift</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #07090d; }
    canvas { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const c = document.getElementById("c");
    const x = c.getContext("2d");
    function r() {
      c.width = innerWidth * devicePixelRatio;
      c.height = innerHeight * devicePixelRatio;
      x.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    addEventListener("resize", r); r();
    let t = 0;
    function draw() {
      t += 0.02;
      x.fillStyle = "#07090d";
      x.fillRect(0, 0, innerWidth, innerHeight);
      for (let i = 0; i < 120; i++) {
        const p = (i / 120) * Math.PI * 2 + t * 0.35;
        const radius = (i * 8 + t * 24) % (Math.max(innerWidth, innerHeight) * 0.8);
        const px = innerWidth * 0.5 + Math.cos(p) * radius * 0.7;
        const py = innerHeight * 0.5 + Math.sin(p * 1.3) * radius * 0.4;
        x.fillStyle = `rgba(${170 + i % 70},${40 + i % 35},${60 + i % 80},0.34)`;
        x.fillRect(px, py, 2, 2);
      }
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
