<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaArch Aurora Flow</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0f16;
    }
    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    function resize() {
      canvas.width = innerWidth * devicePixelRatio;
      canvas.height = innerHeight * devicePixelRatio;
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    resize();
    addEventListener("resize", resize);

    let t = 0;
    function ribbon(yBase, amp, speed, color, width) {
      ctx.beginPath();
      for (let x = 0; x <= innerWidth; x += 8) {
        const y = yBase + Math.sin((x * 0.003) + t * speed) * amp;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.stroke();
    }

    function frame() {
      t += 0.012;
      const w = innerWidth;
      const h = innerHeight;

      ctx.fillStyle = "#0b0f16";
      ctx.fillRect(0, 0, w, h);

      const bg = ctx.createLinearGradient(0, 0, w, h);
      bg.addColorStop(0, "rgba(255,255,255,0.02)");
      bg.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      ribbon(h * 0.55, 80, 1.0, "rgba(214,63,63,0.40)", 48);
      ribbon(h * 0.60, 70, 1.4, "rgba(255,120,120,0.25)", 28);
      ribbon(h * 0.45, 90, 0.8, "rgba(120,140,255,0.15)", 36);

      requestAnimationFrame(frame);
    }
    frame();
  </script>
</body>
</html>
