<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NovaArch Cyber Tides</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#080d18}
    .bg{position:fixed;inset:0;background:radial-gradient(circle at 75% 20%,#2f8fff55,transparent 35%),linear-gradient(160deg,#070c16,#11213a 60%,#091120)}
    .wave{position:absolute;left:-10%;width:120%;height:36%;border-radius:45%;filter:blur(2px);animation:float 12s ease-in-out infinite}
    .w1{bottom:-8%;background:#1f5fbe66}
    .w2{bottom:6%;background:#2ca4ff44;animation-delay:-4s}
    .w3{bottom:18%;background:#63d7ff2c;animation-delay:-8s}
    @keyframes float{0%,100%{transform:translateX(0)}50%{transform:translateX(6%)}}
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="wave w1"></div>
  <div class="wave w2"></div>
  <div class="wave w3"></div>
</body>
</html>
