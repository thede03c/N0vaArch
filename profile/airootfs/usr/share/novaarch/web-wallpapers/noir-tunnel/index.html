<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaArch Noir Tunnel</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #06070b; }
    canvas { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const c = document.getElementById("c");
    const x = c.getContext("2d");
    function resize() {
      c.width = innerWidth * devicePixelRatio;
      c.height = innerHeight * devicePixelRatio;
      x.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    addEventListener("resize", resize); resize();
    let t = 0;
    function draw() {
      t += 0.016;
      const w = innerWidth, h = innerHeight, cx = w / 2, cy = h / 2;
      x.fillStyle = "#06070b";
      x.fillRect(0, 0, w, h);
      for (let i = 0; i < 130; i++) {
        const d = (i * 13 + t * 300) % (Math.max(w, h) * 0.9);
        const a = i * 0.33 + t * 0.7;
        const px = cx + Math.cos(a) * d;
        const py = cy + Math.sin(a) * d;
        x.fillStyle = `rgba(${214 - i % 30},${58 + i % 80},${70 + i % 70},${0.06 + i / 260})`;
        x.fillRect(px, py, 2, 2);
      }
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
