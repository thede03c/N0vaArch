<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaArch Shard Matrix</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #050607; }
    canvas { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const c = document.getElementById("c");
  const x = c.getContext("2d");
  let t = 0;
  const shards = [];

  function fit() {
    c.width = innerWidth * devicePixelRatio;
    c.height = innerHeight * devicePixelRatio;
    x.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  function seed() {
    shards.length = 0;
    const cx = innerWidth / 2;
    const cy = innerHeight / 2;
    for (let i = 0; i < 160; i++) {
      shards.push({
        a: Math.random() * Math.PI * 2,
        r: Math.random(),
        spd: 0.25 + Math.random() * 0.7,
        s: 4 + Math.random() * 18,
        hue: Math.random() < 0.55 ? "crimson" : "steel",
      });
    }
  }
  addEventListener("resize", () => {
    fit();
    seed();
  });
  fit();
  seed();

  function frame() {
    t += 0.017;
    const w = innerWidth;
    const h = innerHeight;
    const cx = w / 2;
    const cy = h / 2;
    x.fillStyle = "#050607";
    x.fillRect(0, 0, w, h);

    shards.forEach((sh, idx) => {
      const jitter = Math.sin(idx * 2.917 + sh.a * 4.1 + t * 6) * 18;
      const dist = ((((sh.r + t * sh.spd * 0.05) % 1) ** 2) + 0.02) * Math.max(w, h) * 0.92;
      const sx = cx + Math.cos(sh.a + t * 0.12) * dist * 1.06;
      const sy = cy + Math.sin(sh.a + t * 0.11) * dist * 0.94;
      const scale = Math.max(0.3, dist / Math.max(w, h) + 0.12);
      const side = sh.s * scale;
      x.save();
      x.translate(sx, sy);
      x.rotate(sh.a + t * (sh.hue === "crimson" ? 2.8 : -2));
      const warm = 205 + jitter;
      x.fillStyle =
        sh.hue === "crimson"
          ? `rgba(${warm},54,74,${0.14 + scale * 0.45})`
          : `rgba(180,206,246,${0.1 + scale * 0.35})`;
      x.strokeStyle = `rgba(255,255,255,${0.04 + scale * 0.16})`;
      x.lineWidth = 1.2;
      x.fillRect(-side / 2, -side / 2, side, side * 1.06);
      x.strokeRect(-side / 2, -side / 2, side, side * 1.06);
      x.restore();
    });
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
