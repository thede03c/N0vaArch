<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaArch Crimson Orbit</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #090b10; }
    canvas { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const c = document.getElementById("c");
    const x = c.getContext("2d");
    function r() {
      c.width = innerWidth * devicePixelRatio;
      c.height = innerHeight * devicePixelRatio;
      x.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    }
    addEventListener("resize", r); r();
    let t = 0;
    function f() {
      t += 0.01;
      const w = innerWidth, h = innerHeight, cx = w * 0.5, cy = h * 0.5;
      x.fillStyle = "#090b10"; x.fillRect(0, 0, w, h);
      for (let i = 0; i < 7; i++) {
        const rad = 70 + i * 70 + Math.sin(t * 1.5 + i) * 15;
        x.beginPath();
        x.arc(cx, cy, rad, 0, Math.PI * 2);
        x.strokeStyle = `rgba(${210 + i * 5},${50 + i * 8},${60 + i * 6},${0.08 + i * 0.04})`;
        x.lineWidth = 3;
        x.stroke();
      }
      requestAnimationFrame(f);
    }
    f();
  </script>
</body>
</html>
