<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>NovaArch Obsidian Weave</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden;
      background: radial-gradient(circle at 52% -10%, rgba(70,106,126,0.35), transparent 52%),
        linear-gradient(168deg, #030506 12%, #0c1216 72%, #020304 96%);
    }
    .wrap {
      position: absolute; inset: -4%;
      opacity: 0.55;
      background:
        repeating-linear-gradient(
          -12deg,
          transparent 0px,
          transparent 34px,
          rgba(212,226,238,0.06) 34px,
          rgba(212,226,238,0.06) 35px
        ),
        repeating-linear-gradient(
          9deg,
          transparent 0px,
          transparent 62px,
          rgba(212,226,238,0.038) 62px,
          rgba(212,226,238,0.038) 63px
        );
      animation: pan 140s linear infinite;
    }
    @keyframes pan { from { transform: rotate(0deg) scale(1.08); } to { transform: rotate(360deg) scale(1.08); } }
  </style>
</head>
<body><div class="wrap"></div></body>
</html>
