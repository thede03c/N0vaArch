<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>NovaArch Phoenix Drift</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #180602; }
    canvas { width: 100vw; height: 100vh; display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  let t = 0;
  function resize() {
    canvas.width = innerWidth * devicePixelRatio;
    canvas.height = innerHeight * devicePixelRatio;
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  resize();
  addEventListener("resize", resize);
  function loop() {
    t += 0.012;
    const w = innerWidth;
    const h = innerHeight;
    const g = ctx.createLinearGradient(0, 0, w * 1.08, h);
    g.addColorStop(0, "#120308");
    g.addColorStop(0.52, "#3a0810");
    g.addColorStop(1, "#080204");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
    for (let k = 0; k < 5; k++) {
      ctx.beginPath();
      const oy = k * (h / 18);
      ctx.moveTo(-40, h * 0.7 + oy);
      for (let x = -40; x <= w + 40; x += 16) {
        const y =
          h * 0.62 +
          Math.sin(x * 0.004 + t * (1 + k * 0.06)) * (72 + k * 24) +
          Math.cos(t * 2.2 + k) * 12;
        ctx.lineTo(x, y + oy);
      }
      ctx.lineTo(w + 80, h + 80);
      ctx.lineTo(-80, h + 80);
      ctx.closePath();
      ctx.fillStyle = `rgba(${200 + k * 22}, ${40 + k * 44}, ${18 + k * 38}, ${0.12 + k * 0.05})`;
      ctx.fill();
    }
    requestAnimationFrame(loop);
  }
  loop();
</script>
</body>
</html>
