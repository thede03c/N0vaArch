# Manual ISO build in GitHub Actions (Arch container + mkarchiso).
# Artifacts can be large; free runners may run out of disk on heavy package sets.
name: Build ISO

on:
  workflow_dispatch:
    inputs:
      kernel_track:
        description: "Kernel track (zen, lts, cachy)"
        required: true
        default: "zen"
        type: choice
        options:
          - zen
          - lts
          - cachy

jobs:
  iso:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    container:
      image: archlinux:latest
      options: --privileged --user root

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: pacman -Syu --noconfirm archiso git rsync gettext ripgrep openssh sudo

      - name: Fix script permissions
        run: chmod +x ./scripts/*.sh

      - name: Build ISO
        run: KERNEL_TRACK='${{ inputs.kernel_track }}' bash ./scripts/build-iso.sh --native

      - name: Generate checksums
        run: sha256sum out/*.iso | tee out/SHA256SUMS.txt

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: novaarch-iso
          path: |
            out/*.iso
            out/SHA256SUMS.txt
          if-no-files-found: error
